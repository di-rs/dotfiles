theme = "tokyonight"

[editor]
line-number = "relative"
default-yank-register = "+"

[editor.file-picker]
hidden = false

# Diff hunk navigation (built-in defaults, no config needed):
#   ]g   jump to next changed hunk
#   [g   jump to previous changed hunk
#   ]G   jump to last changed hunk
#   [G   jump to first changed hunk
